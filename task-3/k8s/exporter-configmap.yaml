apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: analytics-export-data
  namespace: task3-analytics
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: shipment-exporter-config
  namespace: task3-analytics
data:
  DB_HOST: analytics-postgres
  DB_PORT: "5432"
  DB_NAME: analytics
  TABLE: shipments
  DATE_COLUMN: created_at
  OUTPUT_DIR: /exports
