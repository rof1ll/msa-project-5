apiVersion: apps/v1
kind: Deployment
metadata:
  name: export-viewer
spec:
  replicas: 1
  selector:
    matchLabels:
      app: export-viewer
  template:
    metadata:
      labels:
        app: export-viewer
    spec:
      containers:
        - name: shell
          image: busybox:1.36
          command:
            - sh
            - -c
            - sleep 3600
          volumeMounts:
            - name: export-data
              mountPath: /exports
      volumes:
        - name: export-data
          persistentVolumeClaim:
            claimName: analytics-export-data
