services:
  postgres:
    image: postgres:16
    container_name: task1-postgres
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    volumes:
      - ./postgres/init:/docker-entrypoint-initdb.d
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U airflow -d airflow"]
      interval: 10s
      timeout: 5s
      retries: 5

  mailhog:
    image: mailhog/mailhog:v1.0.1
    container_name: task1-mailhog
    ports:
      - "1025:1025"
      - "8025:8025"

  airflow-init:
    build:
      context: ./airflow
    container_name: task1-airflow-init
    depends_on:
      postgres:
        condition: service_healthy
    environment: &airflow-common-env
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "true"
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres:5432/airflow
      AIRFLOW__API__AUTH_BACKENDS: airflow.api.auth.backend.basic_auth,airflow.api.auth.backend.session
      AIRFLOW__EMAIL__EMAIL_BACKEND: airflow.utils.email.send_email_smtp
      AIRFLOW__SMTP__SMTP_HOST: mailhog
      AIRFLOW__SMTP__SMTP_PORT: "1025"
      AIRFLOW__SMTP__SMTP_STARTTLS: "false"
      AIRFLOW__SMTP__SMTP_SSL: "false"
      AIRFLOW__SMTP__SMTP_MAIL_FROM: airflow-demo@example.com
      AIRFLOW_CONN_DEMO_POSTGRES: postgresql://airflow:airflow@postgres:5432/airflow
      SIMULATE_TRANSIENT_FAILURE: ${SIMULATE_TRANSIENT_FAILURE:-true}
      QUALITY_GATE_MAX_MISSING: ${QUALITY_GATE_MAX_MISSING:-99}
      ALERT_THRESHOLD: ${ALERT_THRESHOLD:-2}
    volumes: &airflow-common-volumes
      - ./airflow/dags:/opt/airflow/dags
      - ./airflow/include:/opt/airflow/include
      - ./airflow/logs:/opt/airflow/logs
      - ./airflow/output:/opt/airflow/output
    command:
      - bash
      - -c
      - |
        airflow db migrate &&
        airflow users create \
          --role Admin \
          --username admin \
          --password admin \
          --firstname Demo \
          --lastname User \
          --email admin@example.com || true

  airflow-webserver:
    build:
      context: ./airflow
    container_name: task1-airflow-webserver
    depends_on:
      postgres:
        condition: service_healthy
      airflow-init:
        condition: service_completed_successfully
    environment: *airflow-common-env
    volumes: *airflow-common-volumes
    ports:
      - "8080:8080"
    command: webserver

  airflow-scheduler:
    build:
      context: ./airflow
    container_name: task1-airflow-scheduler
    depends_on:
      postgres:
        condition: service_healthy
      airflow-init:
        condition: service_completed_successfully
    environment: *airflow-common-env
    volumes: *airflow-common-volumes
    command: scheduler
